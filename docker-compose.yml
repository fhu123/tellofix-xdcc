version: "3.8"

services:
  db:
    image: mariadb:10.6
    container_name: tellofix-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-api:
    image: python:3.11-slim
    container_name: tellofix-search
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install flask flask-cors requests beautifulsoup4 pymysql --quiet &&
             python search_api.py"
    volumes:
      - ./search_api.py:/app/search_api.py
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${APP_PORT:-9999}:9999"
    depends_on:
      db:
        condition: service_healthy
